<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sri Afsar Residence — 3D Architectural Model</title>
  <link rel="stylesheet" href="./src/ui/ui.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Pointer-lock blocker overlay (shown during walk mode) -->
  <div id="blocker" style="display:none;position:fixed;inset:0;z-index:20;background:rgba(0,0,0,0.35);cursor:crosshair;">
    <div id="instructions" style="position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#fff;font-family:system-ui;font-size:13px;letter-spacing:.1em;text-align:center;background:rgba(0,0,0,0.5);padding:10px 20px;border-radius:8px;">
      Click to walk · WASD = move · Shift = run · Esc = exit
    </div>
  </div>

  <!-- UI overlay (populated/handled by src/ui/ui.js) -->
  <div id="ui">
    <h1>Sri Afsar Residence</h1>
    <div class="group">
      <div class="group-label">Floors</div>
      <div class="row">
        <button data-floors="gf">Ground</button>
        <button data-floors="ff">First</button>
        <button data-floors="both" class="active">Both</button>
      </div>
    </div>
    <div class="group">
      <div class="group-label">View</div>
      <div class="row">
        <button data-view="3d" class="active">3D</button>
        <button data-view="plan">Plan</button>
        <button data-action="walk">Walk</button>
      </div>
      <div class="row" style="margin-top:6px">
        <button data-toggle="labels" class="active">Labels</button>
        <button data-toggle="roof" class="active">Roof</button>
        <button data-toggle="furniture" class="active">Furniture</button>
        <button data-toggle="landscape" class="active">Landscape</button>
      </div>
    </div>
    <div class="group">
      <div class="group-label">Lighting</div>
      <div class="row">
        <button data-toggle="night">Night Mode</button>
        <button data-action="reset">Reset</button>
      </div>
    </div>
    <div class="hint">Click room to inspect · Drag = orbit · Wheel = zoom · <b>F</b> = open/close nearest door</div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
